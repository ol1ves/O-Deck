<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>O-Deck — Home Screen Explorations</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif&family=JetBrains+Mono:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#f0eee9; font-family:'Inter', system-ui, sans-serif; }
  * { box-sizing: border-box; }

  /* shared screen frame */
  .odeck-screen {
    width: 1024px;
    height: 600px;
    position: relative;
    overflow: hidden;
    color: #fff;
    font-feature-settings: 'cv11', 'ss01';
  }

  /* tiny blink cursor */
  @keyframes odeck-blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .blink { animation: odeck-blink 1.1s steps(1,end) infinite; }

  /* slow pulse for live dot */
  @keyframes odeck-pulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.5; }
  }
  .live-dot { animation: odeck-pulse 2.4s ease-in-out infinite; }

  /* slow drift for ambient bg */
  @keyframes odeck-drift {
    0% { transform: translate(0,0) scale(1); }
    50% { transform: translate(-20px,15px) scale(1.05); }
    100% { transform: translate(0,0) scale(1); }
  }

  /* now playing equalizer */
  @keyframes eq-bar {
    0%,100% { transform: scaleY(0.3); }
    50% { transform: scaleY(1); }
  }
  .eq-bar { transform-origin: bottom; animation: eq-bar 1.1s ease-in-out infinite; }

  /* RSS ticker scroll */
  @keyframes ticker-scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .ticker-track { animation: ticker-scroll 60s linear infinite; }

  /* subtle shimmer for waveforms */
  @keyframes wave-shimmer {
    0%,100% { opacity: 0.7; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
